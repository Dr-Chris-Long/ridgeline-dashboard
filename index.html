<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDGELINE — NEPA Comment Analysis Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0B0F19;--sf:#131825;--sh:#1A2035;--bd:#1E2A42;--bl:#2A3A5C;--tx:#E2E8F0;--tm:#8896B3;--td:#5A6A8A;--ac:#4F8EF7;--gn:#34D399;--yw:#FBBF24;--rd:#F87171;--or:#FB923C;--pp:#A78BFA}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);display:flex;min-height:100vh}
button{font-family:inherit}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}
.sb{width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.sb-b{padding:20px 16px;border-bottom:1px solid var(--bd)}.sb-b h1{font-size:14px;color:var(--ac);letter-spacing:.04em;margin:0}.sb-b p{font-size:11px;color:var(--td);margin-top:4px}
.sb-n{padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nb{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;border:none;cursor:pointer;font-size:13px;background:transparent;color:var(--tm);width:100%;text-align:left;transition:all .15s}
.nb:hover{background:var(--sh)}.nb.a{background:rgba(79,142,247,.1);color:var(--ac);font-weight:600}
.sf{margin-top:auto;padding:12px 16px;border-top:1px solid var(--bd);font-size:10px;color:var(--td)}
.mn{flex:1;padding:28px;overflow-y:auto;min-width:0}.ct{max-width:1200px;margin:0 auto}
.pt{font-size:22px;font-weight:700;margin-bottom:4px}.ps{font-size:12px;color:var(--td);margin-bottom:24px}
.g5{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:20px}
.sl{font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sv{font-size:32px;font-weight:700;line-height:1;font-family:'JetBrains Mono',monospace}
.ss{font-size:12px;color:var(--td);margin-top:6px}
.bg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase}
.tb{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.tb input,.tb select{padding:8px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.tb input:focus,.tb select:focus{border-color:var(--ac)}.tc{font-size:12px;color:var(--td);margin-left:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;background:var(--sh);color:var(--tm);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:1;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--bd);color:var(--tx)}
tr.ck{cursor:pointer}tr.ck:hover{background:var(--sh)}
.tw{overflow:auto;max-height:600px;border-radius:6px;border:1px solid var(--bd)}
.wp{max-width:400px;white-space:normal;line-height:1.5}.tr{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk{background:none;border:none;color:var(--ac);cursor:pointer;font-size:13px;padding:0;margin-bottom:16px}.bk:hover{text-decoration:underline}
.ch{height:300px;position:relative}.ch-sm{height:220px;position:relative}.ch-lg{height:400px;position:relative}
.ct2{font-size:13px;font-weight:600;margin-bottom:16px}
.fl{display:flex;flex-direction:column;gap:20px}.fl2{display:flex;flex-direction:column;gap:16px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--sf);color:var(--tm);transition:all .15s}
.chip:hover,.chip.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.chip-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.meter{height:8px;border-radius:4px;background:var(--bd);overflow:hidden;margin-top:6px}.meter-fill{height:100%;border-radius:4px;transition:width .3s}
.org-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.org-row:hover{background:var(--sh);margin:0 -8px;padding:8px}
.org-name{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.org-count{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--ac);min-width:30px;text-align:right}
.org-bar{width:120px;flex-shrink:0}
.hm-cell{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:default;transition:transform .1s}
.hm-cell:hover{transform:scale(1.3);z-index:2}
.hm-row{display:flex;gap:3px;align-items:center;margin-bottom:3px}
.hm-label{font-size:11px;color:var(--tm);width:60px;text-align:right;margin-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hm-hlabel{font-size:10px;color:var(--td);text-align:center;width:28px;overflow:hidden;text-overflow:ellipsis;writing-mode:vertical-rl;transform:rotate(180deg);height:60px}
.hm-hrow{display:flex;gap:3px;margin-left:68px;margin-bottom:6px}
.timeline-bar{display:flex;gap:2px;align-items:flex-end;height:120px;padding-top:20px}
.timeline-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.timeline-fill{width:100%;min-width:16px;border-radius:3px 3px 0 0;transition:height .3s;cursor:pointer;position:relative}
.timeline-fill:hover{opacity:.8}
.timeline-label{font-size:9px;color:var(--td);writing-mode:vertical-rl;transform:rotate(180deg);height:50px;overflow:hidden}
.tooltip{position:fixed;background:var(--sf);border:1px solid var(--bl);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--tx);pointer-events:none;z-index:100;max-width:250px;box-shadow:0 4px 12px rgba(0,0,0,.4);display:none}
</style>
</head>
<body>
<div class="sb"><div class="sb-b"><h1>RIDGELINE</h1><p>NEPA Comment Analysis</p></div><div class="sb-n" id="nav"></div><div class="sf" id="ft">Loading...</div></div>
<div class="mn"><div class="ct"><h2 class="pt" id="ttl">Overview</h2><div class="ps">BLM Medford District · CTA Pipeline Dashboard</div><div id="con"><p style="text-align:center;padding:60px;color:var(--tm)">Connecting to Supabase...</p></div></div></div>
<div class="tooltip" id="tip"></div>

<script>
const SB_URL="https://uojjoraxzmzwuilmndlu.supabase.co/rest/v1";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvampvcmF4em16d3VpbG1uZGx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODc4MTksImV4cCI6MjA4ODE2MzgxOX0.4WmtuoXjXj441KpbLxJkQTebulejiEafKu0bSvdefpM";
const HDRS={apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"count=exact"};
const CL=["#4F8EF7","#34D399","#FBBF24","#F87171","#A78BFA","#FB923C","#38BDF8","#E879F9","#2DD4BF","#F472B6","#818CF8","#FB7185","#A3E635","#22D3EE"];
let DB={},charts=[],pm={};
const tip=document.getElementById("tip");

async function fetchAll(t,s="*"){let a=[],o=0;while(true){const r=await fetch(`${SB_URL}/${t}?select=${s}&limit=1000&offset=${o}`,{headers:HDRS});if(!r.ok)return a;const d=await r.json();a=a.concat(d);if(d.length<1000)break;o+=1000}return a}

async function loadData(){
  const T={projects:"project_id,project_code,project_name,status",comments:"comment_id,project_id,author_name,submitter_org,comment_type,summary,substantive_confirmed,date_received,full_text",codes:"code_id,comment_id,code_text,category,stance,code_type,substantive",themes:"theme_id,theme_name,description,code_count,occurrences,status,theme_layer,project_id",unique_concerns:"uc_id,code_text,category,stance,occurrences,substantive,uc_type",responses:"response_id,comment_id,theme_id,response_text",theme_comments:"theme_id,comment_id"};
  const e=Object.entries(T);const r=await Promise.all(e.map(([t,s])=>fetchAll(t,s)));
  e.forEach(([t],i)=>{DB[t]=r[i]});
  pm=Object.fromEntries(DB.projects.map(p=>[p.project_id,p.project_code||p.project_name]));
  document.getElementById("ft").textContent=`${DB.projects.length}P · ${DB.comments.length}C · ${DB.themes.length}T · ${DB.codes.length}K`;
}

// --- HELPERS ---
function h(t,a,...c){const e=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")e.className=v;else if(k==="innerHTML")e.innerHTML=v;else e.setAttribute(k,v)});c.flat().forEach(x=>{if(x!=null)e.append(typeof x==="string"||typeof x==="number"?document.createTextNode(x):x)});return e}
function bg(t,c){return h("span",{className:"bg",style:{color:c,background:c+"18"}},t)}
function sc(l,v,s,c="var(--ac)"){return h("div",{className:"cd"},h("div",{className:"sl"},l),h("div",{className:"sv",style:{color:c}},String(v)),s?h("div",{className:"ss"},s):null)}
function dc(){charts.forEach(c=>c.destroy());charts=[]}
function mc(cv,t,cfg){const c=new Chart(cv.getContext("2d"),{type:t,...cfg,options:{...cfg.options,responsive:true,maintainAspectRatio:false,plugins:{...cfg.options?.plugins,legend:{labels:{color:"#8896B3",font:{size:11}},...cfg.options?.plugins?.legend},tooltip:{backgroundColor:"#131825",borderColor:"#2A3A5C",borderWidth:1,titleColor:"#E2E8F0",bodyColor:"#8896B3",padding:10,cornerRadius:6,...cfg.options?.plugins?.tooltip}},scales:t==="pie"||t==="doughnut"||t==="polarArea"?undefined:{x:{ticks:{color:"#5A6A8A",font:{size:11}},grid:{color:"#1E2A42"},...cfg.options?.scales?.x},y:{ticks:{color:"#5A6A8A",font:{size:11}},grid:{color:"#1E2A42"},...cfg.options?.scales?.y}}}});charts.push(c);return c}
function bt(cols,data,opts={}){const w=h("div",{className:"tw",style:{maxHeight:opts.mh||"600px"}});const tb=h("table");const th=h("thead",null,h("tr",null,...cols.map(c=>h("th",null,c.l))));const bd=h("tbody");(data||[]).forEach(r=>{const tr=h("tr",opts.oc?{className:"ck",onClick:()=>opts.oc(r)}:null);cols.forEach(c=>{const td=h("td",c.w?{className:"wp"}:c.t?{className:"tr"}:null);const v=c.r?c.r(r):(r[c.k]??"—");if(v instanceof HTMLElement)td.appendChild(v);else td.textContent=v;tr.appendChild(td)});bd.appendChild(tr)});tb.append(th,bd);w.appendChild(tb);return w}
// Build covered comment set (direct + theme-level responses)
function getCoveredComments(){
  const direct=new Set(DB.responses.map(r=>r.comment_id).filter(Boolean));
  const themedThemes=new Set(DB.responses.map(r=>r.theme_id).filter(Boolean));
  const themeCovered=new Set();
  DB.theme_comments.forEach(tc=>{if(themedThemes.has(tc.theme_id))themeCovered.add(tc.comment_id)});
  return new Set([...direct,...themeCovered]);
}

// Project data completeness status
function getProjectStatus(){
  const covered=getCoveredComments();
  return DB.projects.map(p=>{
    const comments=DB.comments.filter(c=>c.project_id===p.project_id);
    const themes=DB.themes.filter(t=>t.project_id===p.project_id);
    const codes=DB.codes.filter(c=>comments.some(cm=>cm.comment_id===c.comment_id));
    const resp=comments.filter(c=>covered.has(c.comment_id));
    const hasComments=comments.length>0;
    const hasThemes=themes.length>0;
    const hasCodes=codes.length>0;
    const hasResponses=resp.length>0;
    const respPct=comments.length?Math.round(resp.length/comments.length*100):0;
    let status='complete';
    if(!hasComments)status='no-data';
    else if(!hasResponses)status='pending-responses';
    else if(respPct<50)status='partial';
    return{code:pm[p.project_id],pid:p.project_id,comments:comments.length,themes:themes.length,codes:codes.length,responses:resp.length,respPct,status,hasComments,hasThemes,hasCodes,hasResponses};
  });
}

function stanceColor(s){return s==="support"||s==="S"?"#34D399":s==="oppose"||s==="O"?"#F87171":"#FBBF24"}
function stanceLabel(s){return s==="S"?"Support":s==="O"?"Oppose":s==="N"?"Neutral":s||"?"}

// --- PROJECT DETAIL ---
function showProjectDetail(p){
  dc();const f=h("div",{className:"fl"});
  f.appendChild(h("button",{className:"bk",onClick:()=>rOv()},"← Back to Overview"));

  // Header
  const hdr=h("div",{className:"cd"});
  const color=p.status==='complete'?'var(--gn)':p.status==='partial'?'var(--yw)':p.status==='pending-responses'?'var(--or)':'var(--td)';
  const label=p.status==='complete'?'Complete':p.status==='partial'?'Partial':p.status==='pending-responses'?'Needs Responses':'No Data';
  const proj=DB.projects.find(pr=>pr.project_id===p.pid);
  hdr.append(
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("div",{style:{fontSize:"20px",fontWeight:700}},proj?proj.project_name:p.code),
      bg(label,color.replace("var(--","#").replace("gn","34D399").replace("yw","FBBF24").replace("or","FB923C").replace("td","5A6A8A").replace(")",""))));
  const stats=h("div",{style:{display:"flex",gap:"24px",marginTop:"12px"}});
  stats.append(
    h("div",null,h("div",{className:"sl"},"Comments"),h("div",{style:{fontSize:"24px",fontWeight:700,fontFamily:"monospace",color:"var(--ac)"}},p.comments)),
    h("div",null,h("div",{className:"sl"},"Themes"),h("div",{style:{fontSize:"24px",fontWeight:700,fontFamily:"monospace",color:"var(--pp)"}},p.themes)),
    h("div",null,h("div",{className:"sl"},"Codes"),h("div",{style:{fontSize:"24px",fontWeight:700,fontFamily:"monospace",color:"var(--yw)"}},p.codes)),
    h("div",null,h("div",{className:"sl"},"Responses"),h("div",{style:{fontSize:"24px",fontWeight:700,fontFamily:"monospace",color:color}},p.responses)),
    h("div",null,h("div",{className:"sl"},"Coverage"),h("div",{style:{fontSize:"24px",fontWeight:700,fontFamily:"monospace",color:color}},p.respPct+"%")));
  hdr.appendChild(stats);
  f.appendChild(hdr);

  // Project themes
  const pThemes=DB.themes.filter(t=>t.project_id===p.pid).sort((a,b)=>(b.occurrences||0)-(a.occurrences||0));
  if(pThemes.length){
    const tc=h("div",{className:"cd"});tc.append(h("div",{className:"ct2"},"Themes ("+pThemes.length+")"));
    // Stance chart for this project's themes
    const cvRow=h("div",{className:"g2"});
    const chCard=h("div",{className:"cd"});chCard.append(h("div",{className:"ct2"},"Theme Occurrences"));const cv1=h("canvas");chCard.append(h("div",{className:"ch-lg"},cv1));cvRow.appendChild(chCard);
    // Stance breakdown
    const stCard=h("div",{className:"cd"});stCard.append(h("div",{className:"ct2"},"Stance Profile"));const cv2=h("canvas");stCard.append(h("div",{className:"ch-lg"},cv2));cvRow.appendChild(stCard);
    f.appendChild(cvRow);

    tc.appendChild(bt([
      {l:"Theme",k:"theme_name",r:r=>h("span",{style:{fontWeight:"600",cursor:"pointer",color:"var(--ac)"},onClick:e=>{e.stopPropagation();sv("themes");setTimeout(()=>rTh(r),50)}},r.theme_name)},
      {l:"Layer",k:"theme_layer",r:r=>r.theme_layer?bg(r.theme_layer,"#A78BFA"):"—"},
      {l:"Codes",k:"code_count"},{l:"Occurrences",k:"occurrences"},
      {l:"Status",k:"status",r:r=>bg(r.status||"draft",r.status==="Confirmed"||r.status==="active"?"#34D399":"#FBBF24")}
    ],pThemes,{mh:"400px",oc:r=>{sv("themes");setTimeout(()=>rTh(r),50)}}));
    f.appendChild(tc);

    // Render charts after DOM
    setTimeout(()=>{
      const top10=pThemes.slice(0,10);
      mc(cv1,"bar",{data:{labels:top10.map(t=>t.theme_name.length>40?t.theme_name.slice(0,38)+"…":t.theme_name),datasets:[{data:top10.map(t=>t.occurrences||0),backgroundColor:"#A78BFA",borderRadius:4}]},options:{indexAxis:"y",plugins:{legend:{display:false}}}});
      // Stance for this project
      const pCodes=DB.codes.filter(c=>DB.comments.some(cm=>cm.project_id===p.pid&&cm.comment_id===c.comment_id));
      const stMap={};pCodes.forEach(c=>{const s=stanceLabel(c.stance);stMap[s]=(stMap[s]||0)+1});
      const stD=Object.entries(stMap).sort((a,b)=>b[1]-a[1]);
      mc(cv2,"doughnut",{data:{labels:stD.map(s=>s[0]),datasets:[{data:stD.map(s=>s[1]),backgroundColor:stD.map(s=>stanceColor(s[0]==="Support"?"S":s[0]==="Oppose"?"O":"N"))}]},options:{cutout:"55%",plugins:{legend:{position:"right"}}}});
    },50);
  }

  // Project comments
  const pComments=DB.comments.filter(c=>c.project_id===p.pid);
  if(pComments.length){
    const cc=h("div",{className:"cd"});cc.append(h("div",{className:"ct2"},"Comments ("+pComments.length+")"));
    cc.appendChild(bt([
      {l:"ID",k:"comment_id"},{l:"Author",k:"author_name",r:r=>r.author_name||"Anon"},
      {l:"Org",k:"submitter_org",r:r=>r.submitter_org||"—"},
      {l:"Type",k:"comment_type",r:r=>r.comment_type?bg(r.comment_type,"#4F8EF7"):"—"},
      {l:"Sub",k:"substantive_confirmed",r:r=>r.substantive_confirmed?bg("Yes","#34D399"):"No"},
      {l:"Date",k:"date_received"}
    ],pComments,{mh:"400px",oc:r=>rCm(r)}));
    f.appendChild(cc);
  }

  // Responses for this project
  const covered=getCoveredComments();
  const pResp=pComments.filter(c=>covered.has(c.comment_id));
  const pUnresp=pComments.filter(c=>!covered.has(c.comment_id)&&c.substantive_confirmed);
  if(pUnresp.length){
    const uc=h("div",{className:"cd",style:{borderColor:"var(--or)"}});
    uc.append(h("div",{className:"ct2",style:{color:"var(--rd)"}},"Unresponded Substantive ("+pUnresp.length+")"));
    uc.appendChild(bt([
      {l:"ID",k:"comment_id"},{l:"Author",k:"author_name",r:r=>r.author_name||"Anon"},
      {l:"Org",k:"submitter_org"},{l:"Summary",k:"summary",w:1}
    ],pUnresp,{mh:"300px",oc:r=>rCm(r)}));
    f.appendChild(uc);
  }

  document.getElementById("con").replaceChildren(f);
  document.getElementById("ttl").textContent=p.code+" — Project Detail";
}

// --- OVERVIEW ---
function rOv(){dc();const f=h("div",{className:"fl"});
  const tot=DB.comments.length,sub=DB.comments.filter(c=>c.substantive_confirmed).length;
  const ri=getCoveredComments();const rt=tot?Math.round(ri.size/tot*100):0;
  const orgs=new Set(DB.comments.map(c=>c.submitter_org).filter(Boolean));

  // Stats
  const s=h("div",{className:"g5"});
  s.append(sc("Projects",DB.projects.length,"In pipeline"),sc("Comments",tot,sub+" substantive","var(--gn)"),sc("Themes",DB.themes.length,"Across all projects","var(--pp)"),sc("Codes",DB.codes.length,DB.unique_concerns.length+" unique concerns","var(--yw)"),sc("Response Rate",rt+"%",ri.size+" of "+tot+" addressed",rt>=80?"var(--gn)":rt>=50?"var(--yw)":"var(--rd)"));
  f.appendChild(s);

  // Pipeline Status
  const psCard=h("div",{className:"cd"});psCard.append(h("div",{className:"ct2"},"Pipeline Data Status"));
  const psGrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"10px"}});
  const pStatus=getProjectStatus();
  pStatus.forEach(p=>{
    const color=p.status==='complete'?'var(--gn)':p.status==='partial'?'var(--yw)':p.status==='pending-responses'?'var(--or)':'var(--td)';
    const label=p.status==='complete'?'Complete':p.status==='partial'?'Partial':p.status==='pending-responses'?'Needs Responses':'No Data';
    const card=h("div",{style:{background:"var(--bg)",borderRadius:"6px",padding:"12px",border:"1px solid var(--bd)",cursor:"pointer",transition:"border-color .15s"},onClick:()=>showProjectDetail(p),onMouseenter:e=>e.currentTarget.style.borderColor="var(--ac)",onMouseleave:e=>e.currentTarget.style.borderColor="var(--bd)"});
    card.append(
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},
        h("span",{style:{fontSize:"14px",fontWeight:700,color:"var(--tx)"}},p.code),
        h("span",{className:"bg",style:{color,background:color+"18",fontSize:"9px"}},label)),
      h("div",{style:{display:"flex",gap:"12px",fontSize:"11px",color:"var(--tm)"}},
        h("span",null,"C:"+p.comments),h("span",null,"T:"+p.themes),h("span",null,"K:"+p.codes)),
      h("div",{className:"meter",style:{marginTop:"6px"}},h("div",{className:"meter-fill",style:{width:p.respPct+"%",background:color}})),
      h("div",{style:{fontSize:"10px",color:"var(--td)",marginTop:"4px"}},p.hasResponses?p.respPct+"% response coverage":"No responses extracted")
    );
    psGrid.appendChild(card);

  const trD=Object.values(thResp).sort((a,b)=>b.c-a.c).slice(0,15);
  if(trD.length){const cc=h("div",{className:"cd"});cc.append(h("div",{className:"ct2"},"Responses by Theme"));const cv=h("canvas");cc.append(h("div",{className:"ch-lg"},cv));f.appendChild(cc);
  document.getElementById("con").replaceChildren(f);
  mc(cv,"bar",{data:{labels:trD.map(d=>d.n.length>30?d.n.slice(0,28)+"…":d.n),datasets:[{data:trD.map(d=>d.c),backgroundColor:"#34D399",borderRadius:4}]},options:{indexAxis:"y",plugins:{legend:{display:false}}}});
  }else{document.getElementById("con").replaceChildren(f)}

  // Pending extraction notice
  const pending=getProjectStatus().filter(p=>p.status==='pending-responses');
  if(pending.length){
    const nc=h("div",{className:"cd",style:{borderColor:"var(--or)"}});
    nc.append(h("div",{className:"ct2",style:{color:"var(--or)"}},"Pending Response Extraction ("+pending.length+" projects)"));
    const plist=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
    pending.forEach(p=>plist.appendChild(bg(p.code+" ("+p.comments+" comments)","#FB923C")));
    nc.appendChild(plist);
    nc.append(h("div",{style:{fontSize:"12px",color:"var(--td)",marginTop:"8px"}},"These EAs have comment response sections that have not yet been extracted into the database."));
    f.appendChild(nc);
  }

  if(ur.length){const d=h("div",{className:"cd"});d.append(h("div",{className:"ct2",style:{color:"var(--rd)"}},"Unresponded Substantive ("+ur.length+")"));d.appendChild(bt([{l:"ID",k:"comment_id"},{l:"Project",k:"project_id",r:r=>pm[r.project_id]||"—"},{l:"Author",k:"author_name",r:r=>r.author_name||"Anon"},{l:"Org",k:"submitter_org"},{l:"Summary",k:"summary",w:1}],ur,{mh:"400px",oc:r=>rCm(r)}));f.appendChild(d)}
}

// --- CODEBOOK ---
function rCb(){dc();const f=h("div",{className:"fl"});let tab="codes";
  const tb=h("div",{className:"tb"});
  const t1=h("button",{className:"nb a",onClick:()=>{tab="codes";t1.className="nb a";t2.className="nb";rf()}},"Codes ("+DB.codes.length+")");
  const t2=h("button",{className:"nb",onClick:()=>{tab="uc";t2.className="nb a";t1.className="nb";rf()}},"UC ("+DB.unique_concerns.length+")");
  const si=h("input",{type:"text",placeholder:"Search...",style:{width:"200px"}});
  const cs=h("select");cs.append(h("option",{value:"all"},"All Categories"));[...new Set(DB.codes.map(c=>c.category).filter(Boolean))].sort().forEach(c=>cs.append(h("option",{value:c},c)));
  const stf=h("select");stf.append(h("option",{value:"all"},"All Stances"),h("option",{value:"S"},"Support"),h("option",{value:"O"},"Oppose"),h("option",{value:"N"},"Neutral"));
  tb.append(t1,t2,si,cs,stf);f.appendChild(tb);

  // Chart row
  const cr=h("div",{className:"g2"});
  const cc1=h("div",{className:"cd"});cc1.append(h("div",{className:"ct2"},"Category Distribution"));const cv1=h("canvas");cc1.append(h("div",{className:"ch"},cv1));cr.appendChild(cc1);
  const cc2=h("div",{className:"cd"});cc2.append(h("div",{className:"ct2"},"Stance × Category"));const cv2=h("canvas");cc2.append(h("div",{className:"ch"},cv2));cr.appendChild(cc2);
  f.appendChild(cr);

  const tc=h("div");f.appendChild(tc);

  function rf(){
    dc();const s=si.value.toLowerCase(),cf=cs.value,sf=stf.value;
    const src=tab==="codes"?DB.codes:DB.unique_concerns;
    const fl=src.filter(c=>{
      if(cf!=="all"&&c.category!==cf)return false;
      if(sf!=="all"&&c.stance!==sf)return false;
      if(s)return(c.code_text||"").toLowerCase().includes(s);return true;
    });

    // Category donut
    const cats={};fl.forEach(c=>{const ca=c.category||"?";cats[ca]=(cats[ca]||0)+1});
    const catD=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,10);
    mc(cv1,"doughnut",{data:{labels:catD.map(c=>c[0]),datasets:[{data:catD.map(c=>c[1]),backgroundColor:CL}]},options:{cutout:"50%",plugins:{legend:{position:"right",labels:{boxWidth:10,font:{size:10}}}}}});

    // Stance × Category stacked
    const topCats=catD.slice(0,8).map(c=>c[0]);
    const stances=["S","O","N"];const sLabels=["Support","Oppose","Neutral"];const sCols=["#34D399","#F87171","#FBBF24"];
    const stData=stances.map((st,i)=>({label:sLabels[i],data:topCats.map(cat=>fl.filter(c=>c.category===cat&&c.stance===st).length),backgroundColor:sCols[i],borderRadius:2}));
    mc(cv2,"bar",{data:{labels:topCats.map(c=>c.length>12?c.slice(0,10)+"…":c),datasets:stData},options:{plugins:{legend:{position:"bottom"}},scales:{x:{stacked:true,ticks:{maxRotation:35}},y:{stacked:true}}}});

    const cols=tab==="codes"?[{l:"ID",k:"code_id"},{l:"Code",k:"code_text",w:1},{l:"Cat",k:"category"},{l:"Stance",k:"stance",r:r=>r.stance?bg(stanceLabel(r.stance),stanceColor(r.stance)):"—"},{l:"Type",k:"code_type"},{l:"Sub",k:"substantive",r:r=>r.substantive?bg("Yes","#34D399"):""}]:[{l:"UC",k:"uc_id"},{l:"Concern",k:"code_text",w:1},{l:"Cat",k:"category"},{l:"Stance",k:"stance",r:r=>r.stance?bg(stanceLabel(r.stance),stanceColor(r.stance)):"—"},{l:"Occ",k:"occurrences"},{l:"Sub",k:"substantive",r:r=>r.substantive?bg("Yes","#34D399"):""}];
    tc.replaceChildren(bt(cols,fl));
  }
  si.addEventListener("input",rf);cs.addEventListener("change",rf);stf.addEventListener("change",rf);
  document.getElementById("con").replaceChildren(f);rf();
}

// --- PROJECTS ---
function rPj(projDetail,commentDetail){
  dc();const f=h("div",{className:"fl"});
  const covered=getCoveredComments();

  // --- Comment Detail Panel ---
  if(commentDetail){
    const proj=DB.projects.find(p=>p.project_id===commentDetail.project_id);
    f.appendChild(h("button",{className:"bk",onClick:()=>rPj(proj)},"← Back to "+pm[commentDetail.project_id]));

    // Comment card
    const cc=h("div",{className:"cd"});
    cc.append(
      h("div",{style:{fontSize:"18px",fontWeight:700}},commentDetail.author_name||"Anonymous"),
      h("div",{style:{fontSize:"13px",color:"var(--tm)",marginTop:"4px"}},(commentDetail.submitter_org||"—")+" · "+pm[commentDetail.project_id]+" · "+(commentDetail.date_received||"—")));
    const tags=h("div",{style:{display:"flex",gap:"8px",marginTop:"8px"}});
    if(commentDetail.substantive_confirmed)tags.appendChild(bg("Substantive","#34D399"));
    if(commentDetail.comment_type)tags.appendChild(bg(commentDetail.comment_type,"#A78BFA"));
    const isCovered=covered.has(commentDetail.comment_id);
    tags.appendChild(bg(isCovered?"Response Exists":"No Response",isCovered?"#34D399":"#F87171"));
    cc.appendChild(tags);
    if(commentDetail.summary)cc.append(h("div",{style:{fontSize:"11px",color:"var(--td)",textTransform:"uppercase",marginTop:"16px"}},"Summary"),h("div",{style:{fontSize:"13px",color:"var(--tx)",marginTop:"6px",lineHeight:"1.6"}},commentDetail.summary));
    if(commentDetail.full_text)cc.append(h("div",{style:{fontSize:"11px",color:"var(--td)",textTransform:"uppercase",marginTop:"16px"}},"Full Text"),h("div",{style:{fontSize:"13px",color:"var(--tm)",marginTop:"6px",lineHeight:"1.6",maxHeight:"250px",overflowY:"auto",whiteSpace:"pre-wrap"}},commentDetail.full_text));
    f.appendChild(cc);

    // Three-panel layout: Themes | Codes | Responses
    const panels=h("div",{className:"g3"});

    // Linked Themes
    const cThemes=DB.theme_comments.filter(tc=>tc.comment_id===commentDetail.comment_id).map(tc=>DB.themes.find(t=>t.theme_id===tc.theme_id)).filter(Boolean);
    const tp=h("div",{className:"cd"});
    tp.append(h("div",{className:"ct2",style:{color:"var(--pp)"}},"Themes ("+cThemes.length+")"));
    if(cThemes.length){
      cThemes.forEach(t=>{
        const row=h("div",{style:{padding:"8px 0",borderBottom:"1px solid var(--bd)"}});
        row.append(
          h("div",{style:{fontWeight:600,fontSize:"13px",cursor:"pointer",color:"var(--ac)"},onClick:()=>{sv("themes");setTimeout(()=>rTh(t),50)}},t.theme_name),
          h("div",{style:{fontSize:"11px",color:"var(--td)",marginTop:"4px"}},
            (t.theme_layer||"—")+" · "+(t.code_count||0)+" codes · "+(t.occurrences||0)+" occ"));
        tp.appendChild(row);
      });
    } else { tp.append(h("div",{style:{color:"var(--td)",fontSize:"12px"}},"No themes linked")); }
    panels.appendChild(tp);

    // Linked Codes
    const cCodes=DB.codes.filter(c=>c.comment_id===commentDetail.comment_id);
    const kp=h("div",{className:"cd"});
    kp.append(h("div",{className:"ct2",style:{color:"var(--yw)"}},"Codes ("+cCodes.length+")"));
    if(cCodes.length){
      cCodes.forEach(c=>{
        const row=h("div",{style:{padding:"6px 0",borderBottom:"1px solid var(--bd)",fontSize:"12px"}});
        row.append(
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("span",{style:{color:"var(--tx)"}},c.code_text||"—"),
            bg(stanceLabel(c.stance),stanceColor(c.stance))),
          h("div",{style:{fontSize:"11px",color:"var(--td)",marginTop:"2px"}},(c.category||"—")+" · "+(c.code_type||"—")));
        kp.appendChild(row);
      });
    } else { kp.append(h("div",{style:{color:"var(--td)",fontSize:"12px"}},"No codes")); }
    panels.appendChild(kp);

    // Linked Responses
    const directResp=DB.responses.filter(r=>r.comment_id===commentDetail.comment_id);
    const themeIds=new Set(cThemes.map(t=>t.theme_id));
    const themeResp=DB.responses.filter(r=>r.theme_id&&themeIds.has(r.theme_id)&&r.comment_id!==commentDetail.comment_id);
    const rp=h("div",{className:"cd"});
    rp.append(h("div",{className:"ct2",style:{color:"var(--gn)"}},"Responses ("+(directResp.length+themeResp.length)+")"));
    if(directResp.length){
      rp.append(h("div",{style:{fontSize:"11px",color:"var(--td)",textTransform:"uppercase",marginBottom:"6px"}},"Direct Responses"));
      directResp.forEach(r=>{
        const row=h("div",{style:{padding:"6px 0",borderBottom:"1px solid var(--bd)",fontSize:"12px",color:"var(--tx)",lineHeight:"1.5"}});
        row.textContent=r.response_text||(r.theme_id?"Response via theme "+r.theme_id:"Response recorded");
        rp.appendChild(row);
      });
    }
    if(themeResp.length){
      rp.append(h("div",{style:{fontSize:"11px",color:"var(--td)",textTransform:"uppercase",marginTop:"8px",marginBottom:"6px"}},"Via Linked Themes"));
      themeResp.forEach(r=>{
        const th=DB.themes.find(t=>t.theme_id===r.theme_id);
        const row=h("div",{style:{padding:"6px 0",borderBottom:"1px solid var(--bd)",fontSize:"12px"}});
        row.append(h("span",{style:{color:"var(--pp)"}},th?th.theme_name:"Theme "+r.theme_id));
        if(r.response_text)row.append(h("div",{style:{color:"var(--tm)",marginTop:"2px",fontSize:"11px"}},r.response_text.slice(0,150)+(r.response_text.length>150?"…":"")));
        rp.appendChild(row);
      });
    }
    if(!directResp.length&&!themeResp.length){
      rp.append(h("div",{style:{color:"var(--rd)",fontSize:"12px"}},"No responses found for this comment or its linked themes"));
    }
    panels.appendChild(rp);
    f.appendChild(panels);

    document.getElementById("con").replaceChildren(f);
    document.getElementById("ttl").textContent="Comment Detail";
    return;
  }

  // --- Project Detail ---
  if(projDetail){
    const pid=projDetail.project_id;
    f.appendChild(h("button",{className:"bk",onClick:()=>rPj()},"← All Projects"));

    // Header
    const hdr=h("div",{className:"cd"});
    const pComments=DB.comments.filter(c=>c.project_id===pid);
    const pThemes=DB.themes.filter(t=>t.project_id===pid).sort((a,b)=>(b.occurrences||0)-(a.occurrences||0));
    const pCovered=pComments.filter(c=>covered.has(c.comment_id)).length;
    const pPct=pComments.length?Math.round(pCovered/pComments.length*100):0;
    hdr.append(
      h("div",{style:{fontSize:"20px",fontWeight:700}},projDetail.project_name||pm[pid]),
      h("div",{style:{display:"flex",gap:"20px",marginTop:"12px",flexWrap:"wrap"}},
        h("div",null,h("span",{className:"sl"},"Comments "),h("span",{style:{fontFamily:"monospace",fontWeight:700,fontSize:"18px",color:"var(--ac)"}},pComments.length)),
        h("div",null,h("span",{className:"sl"},"Themes "),h("span",{style:{fontFamily:"monospace",fontWeight:700,fontSize:"18px",color:"var(--pp)"}},pThemes.length)),
        h("div",null,h("span",{className:"sl"},"Response Coverage "),h("span",{style:{fontFamily:"monospace",fontWeight:700,fontSize:"18px",color:pPct>=80?"var(--gn)":pPct>=50?"var(--yw)":"var(--rd)"}},pPct+"%"))));
    f.appendChild(hdr);

    // Themes for this project
    if(pThemes.length){
      const tc=h("div",{className:"cd"});tc.append(h("div",{className:"ct2"},"Themes ("+pThemes.length+")"));
      tc.appendChild(bt([
        {l:"Theme",k:"theme_name",r:r=>h("span",{style:{fontWeight:600}},r.theme_name)},
        {l:"Layer",k:"theme_layer",r:r=>r.theme_layer?bg(r.theme_layer,"#A78BFA"):"—"},
        {l:"Codes",k:"code_count"},{l:"Occurrences",k:"occurrences"},
        {l:"Status",k:"status",r:r=>bg(r.status||"draft",r.status==="Confirmed"||r.status==="active"?"#34D399":"#FBBF24")}
      ],pThemes,{mh:"300px",oc:r=>{sv("themes");setTimeout(()=>rTh(r),50)}}));
      f.appendChild(tc);
    }

    // Comments with response status indicator
    if(pComments.length){
      const cc=h("div",{className:"cd"});cc.append(h("div",{className:"ct2"},"Comments ("+pComments.length+") — click any row to see themes, codes, and responses"));
      cc.appendChild(bt([
        {l:"ID",k:"comment_id"},
        {l:"Author",k:"author_name",r:r=>r.author_name||"Anon"},
        {l:"Org",k:"submitter_org",r:r=>r.submitter_org||"—"},
        {l:"Type",k:"comment_type",r:r=>r.comment_type?bg(r.comment_type,"#4F8EF7"):"—"},
        {l:"Sub",k:"substantive_confirmed",r:r=>r.substantive_confirmed?bg("Yes","#34D399"):"No"},
        {l:"Response",k:"comment_id",r:r=>{
          const hasResp=covered.has(r.comment_id);
          return bg(hasResp?"✓":"✗",hasResp?"#34D399":"#F87171");
        }},
        {l:"Date",k:"date_received"}
      ],pComments,{mh:"500px",oc:r=>rPj(projDetail,r)}));
      f.appendChild(cc);
    }

    document.getElementById("con").replaceChildren(f);
    document.getElementById("ttl").textContent=pm[pid]+" — Project Detail";
    return;
  }

  // --- Project List ---
  document.getElementById("ttl").textContent="Projects";
  const pStatus=getProjectStatus();
  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:"16px"}});
  DB.projects.forEach(proj=>{
    const ps=pStatus.find(p=>p.pid===proj.project_id)||{};
    const color=ps.status==='complete'?'var(--gn)':ps.status==='partial'?'var(--yw)':ps.status==='pending-responses'?'var(--or)':'var(--td)';
    const label=ps.status==='complete'?'Complete':ps.status==='partial'?'Partial':ps.status==='pending-responses'?'Needs Responses':'No Data';
    const card=h("div",{className:"cd",style:{cursor:"pointer",transition:"border-color .15s"},onClick:()=>rPj(proj),onMouseenter:e=>e.currentTarget.style.borderColor="var(--ac)",onMouseleave:e=>e.currentTarget.style.borderColor="var(--bd)"});
    card.append(
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}},
        h("div",{style:{fontSize:"16px",fontWeight:700}},proj.project_name||pm[proj.project_id]),
        bg(label,color.replace("var(--","").replace(")","").replace("gn","#34D399").replace("yw","#FBBF24").replace("or","#FB923C").replace("td","#5A6A8A"))),
      h("div",{style:{display:"flex",gap:"16px",fontSize:"12px",color:"var(--tm)",marginBottom:"8px"}},
        h("span",null,"Comments: "+(ps.comments||0)),
        h("span",null,"Themes: "+(ps.themes||0)),
        h("span",null,"Codes: "+(ps.codes||0))),
      h("div",{className:"meter"},h("div",{className:"meter-fill",style:{width:(ps.respPct||0)+"%",background:color}})),
      h("div",{style:{fontSize:"11px",color:"var(--td)",marginTop:"4px"}},(ps.respPct||0)+"% response coverage"));
    grid.appendChild(card);
  });
  f.appendChild(grid);
  document.getElementById("con").replaceChildren(f);
}

// --- NAV ---
const VW=[{id:"overview",l:"Overview",ic:"◉",fn:rOv},{id:"projects",l:"Projects",ic:"◫",fn:rPj},{id:"comments",l:"Comments",ic:"◈",fn:rCm},{id:"themes",l:"Themes",ic:"◆",fn:rTh},{id:"responses",l:"Responses",ic:"◇",fn:rRe},{id:"codebook",l:"Codebook",ic:"▣",fn:rCb}];
let cv="overview";
function sv(id){cv=id;document.querySelectorAll(".nb").forEach(b=>b.classList.toggle("a",b.dataset.v===id));document.getElementById("ttl").textContent=VW.find(v=>v.id===id).l;VW.find(v=>v.id===id).fn()}

const nav=document.getElementById("nav");VW.forEach(v=>{const b=h("button",{className:"nb"+(v.id==="overview"?" a":""),"data-v":v.id,onClick:()=>sv(v.id)});b.append(h("span",{style:{fontSize:"15px"}},v.ic)," "+v.l);nav.appendChild(b)});

(async()=>{try{await loadData();rOv()}catch(e){document.getElementById("con").innerHTML=`<div class="cd" style="color:var(--rd)">Failed: ${e.message}</div>`}})();
</script>
</body>
</html>
